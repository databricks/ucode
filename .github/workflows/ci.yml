name: CI

on:
  workflow_dispatch:
  pull_request:
  push:
    branches: [main]

permissions:
  contents: read

jobs:
  test:
    runs-on:
      group: databricks-protected-runner-group
      labels: linux-ubuntu-latest
    env:
      UV_INDEX_URL: https://pypi-proxy.cloud.databricks.com/simple
    steps:
      - uses: actions/checkout@11bd71901bbe5b1630ceea73d27597364c9af683  # v4.2.2
      - name: Network egress diagnostics
        # Confirm which hosts this runner can reach. We expect:
        #   files.pythonhosted.org   → 200  (lockfile wheel downloads work in past runs)
        #   pypi-proxy.cloud.databricks.com → ??? (build-isolation /simple/ lookups time out)
        #   pypi.org                 → TLS EOF (seen in earlier runs without UV_INDEX_URL)
        # The exit codes are tolerated so we can see every result before pytest runs.
        run: |
          set +e
          for url in \
            https://files.pythonhosted.org/ \
            https://pypi-proxy.cloud.databricks.com/simple/setuptools/ \
            https://pypi.org/simple/setuptools/; do
            echo "=== $url ==="
            curl -fsv --connect-timeout 15 --max-time 30 -o /dev/null "$url" 2>&1 | tail -25
            echo "exit=$?"
            echo
          done
          echo "=== DNS lookups ==="
          for host in files.pythonhosted.org pypi-proxy.cloud.databricks.com pypi.org; do
            echo "--- $host ---"
            getent hosts "$host" || echo "DNS failed"
          done
      - uses: astral-sh/setup-uv@08807647e7069bb48b6ef5acd8ec9567f424441b  # v8.1.0
      - run: uv run pytest --ignore=tests/test_e2e.py

  e2e:
    if: vars.E2E_ENABLED == 'true'
    runs-on:
      group: databricks-protected-runner-group
      labels: linux-ubuntu-latest
    env:
      UV_INDEX_URL: https://pypi-proxy.cloud.databricks.com/simple
      UCODE_TEST_WORKSPACE: ${{ secrets.UCODE_TEST_WORKSPACE }}
      DATABRICKS_HOST: ${{ secrets.UCODE_TEST_WORKSPACE }}
      DATABRICKS_CLIENT_ID: ${{ secrets.DATABRICKS_CLIENT_ID }}
      DATABRICKS_CLIENT_SECRET: ${{ secrets.DATABRICKS_CLIENT_SECRET }}
    steps:
      - uses: actions/checkout@11bd71901bbe5b1630ceea73d27597364c9af683  # v4.2.2
      - uses: actions/setup-node@49933ea5288caeca8642d1e84afbd3f7d6820020  # v4
      - uses: astral-sh/setup-uv@08807647e7069bb48b6ef5acd8ec9567f424441b  # v8.1.0
      - uses: databricks/setup-cli@bdb89f81c11a5bd647fd55b585b7c396ec68a25a  # v1.0.0
      - run: uv tool install .
      - run: uv run pytest tests/test_e2e.py -v
